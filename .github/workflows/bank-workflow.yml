name: ML Pipeline (Manual)

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset file name (inside data/ folder)"
        required: true
        default: "bank.csv"

      model:
        description: "Model type (e.g., rf, svm, cnn)"
        required: true
        default: "rf"

      epochs:
        description: "Number of epochs (for DL)"
        required: false
        default: "10"

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Cache pip dependencies
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 5. Create output directories
      - name: Prepare folders
        run: |
          mkdir -p outputs/models
          mkdir -p outputs/logs

      # 6. Run Feature Selection (CLO / AOOA)
      - name: Feature Selection
        run: |
          python feature_selection.py \
            --dataset data/${{ github.event.inputs.dataset }} \
            --method clo \
            --output outputs/selected_features.csv

      # 7. Train Model
      - name: Train Model
        run: |
          python train.py \
            --dataset data/${{ github.event.inputs.dataset }} \
            --features outputs/selected_features.csv \
            --model ${{ github.event.inputs.model }} \
            --epochs ${{ github.event.inputs.epochs }} \
            --save_model outputs/models/model.pkl \
            --log outputs/logs/train.log

      # 8. Evaluate Model
      - name: Evaluate Model
        run: |
          python evaluate.py \
            --model outputs/model.pkl \
            --dataset data/${{ github.event.inputs.dataset }} \
            --output outputs/metrics.json

      # 9. Upload Results (Artifacts)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-results
          path: outputs/